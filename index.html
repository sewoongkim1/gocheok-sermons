<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="고척교회 설교를 AI가 핵심 3점·본문·적용 질문으로 정리한 말씀 아카이브"
    />
    <title>고척교회 말씀 아카이브</title>

    <!-- PWA / 바로가기 (상태바는 앱 헤더와 같은 네이비 → 라이트·다크 모두 가독성 확보) -->
    <meta name="theme-color" content="#1a3a6b" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png?v=2" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=2" />
    <meta name="apple-mobile-web-app-title" content="말씀아카이브" />
    <meta name="apple-mobile-web-app-capable" content="yes" />

    <!-- 카카오톡/OG 공유 썸네일 -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="말씀 아카이브 | 오직 성경, 말씀이 답이다!" />
    <meta
      property="og:description"
      content="주의 말씀은 내 발에 등이요 내 길에 빛이니이다"
    />
    <meta property="og:image" content="https://sermon.onlybible.kr/og-cover.png?v=2" />
    <meta property="og:image:secure_url" content="https://sermon.onlybible.kr/og-cover.png?v=2" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="고척교회 말씀 아카이브" />
    <meta property="og:url" content="https://sermon.onlybible.kr/" />
    <meta property="og:site_name" content="고척교회 말씀 아카이브" />
    <meta name="twitter:card" content="summary_large_image" />
    <style>
      /* 스플래시 (앱 로드 전 즉시 표시) */
      #splash {
        position: fixed;
        inset: 0;
        z-index: 999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(160deg, #1a3a6b, #0f2545);
        transition: opacity 0.4s;
      }
      #splash.hide {
        opacity: 0;
        pointer-events: none;
      }
      .splash-inner {
        text-align: center;
        color: #fff;
      }
      #splash-logo {
        box-sizing: content-box;
        width: 84px;
        height: auto;
        padding: 16px;
        margin: 0 auto 20px;
        background: #fff;
        border-radius: 22px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.28);
        animation: splash-pulse 2.4s ease-in-out infinite;
      }
      @keyframes splash-pulse {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.07);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        #splash-logo {
          animation: none;
        }
      }
      .splash-title {
        font-size: 20px;
        font-weight: 800;
        letter-spacing: 0.5px;
      }
      .splash-sub {
        margin-top: 8px;
        font-size: 13px;
        opacity: 0.85;
      }
      .splash-ver {
        margin-top: 22px;
        font-size: 11px;
        opacity: 0.5;
        font-family: ui-monospace, Consolas, monospace;
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <div class="splash-inner">
        <img id="splash-logo" src="https://summer.onlybible.kr/logo3.png" alt="고척교회" />
        <div class="splash-title">고척교회 말씀 아카이브</div>
        <div class="splash-sub">오직 성경, 말씀이 답이다!</div>
        <div class="splash-ver">v1.1</div>
      </div>
    </div>
    <script>
      window.hideSplash = function () {
        var s = document.getElementById('splash')
        if (!s) return
        s.classList.add('hide')
        setTimeout(function () {
          if (s && s.parentNode) s.parentNode.removeChild(s)
        }, 400)
      }
      setTimeout(window.hideSplash, 6000) // 안전장치
    </script>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
